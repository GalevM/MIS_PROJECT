name: mis_project
description: "Моја Општина - апликација за пријавување проблеми."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  geocoding: ^2.0.5
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_messaging: ^15.1.0
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  google_fonts: ^6.0.0
  image_picker: ^1.1.0
  permission_handler: ^12.0.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.0
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  flutter_svg: ^2.0.10
  fl_chart: ^0.70.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  cloudinary_public: ^0.23.1

# Flutter Launcher Icons - Fixed Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

  # For better adaptive icon on Android (this often fixes the default icon issue)
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - .env